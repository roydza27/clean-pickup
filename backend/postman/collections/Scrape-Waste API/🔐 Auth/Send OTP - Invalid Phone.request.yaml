$kind: http-request
name: 'Send OTP - Invalid Phone (< 10 digits)'
method: POST
url: '{{baseUrl}}/api/auth/send-otp'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phoneNumber": "12345"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has error: Invalid phone number", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.equal("Invalid phone number");
      });
