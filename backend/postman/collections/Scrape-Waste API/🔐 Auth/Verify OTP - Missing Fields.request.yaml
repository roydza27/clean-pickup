$kind: http-request
name: Verify OTP - Missing Fields
method: POST
url: '{{baseUrl}}/api/auth/verify-otp'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phoneNumber": "9876543210"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response has error: Missing data", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.equal("Missing data");
      });
