$kind: http-request
name: Update Payment Status
method: PATCH
url: '{{baseUrl}}/api/payments/{{pickupId}}/status'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{adminToken}}'
body:
  type: json
  content: |-
    {
      "status": "paid",
      "transactionId": "TXN-TEST-001",
      "paidAt": "2025-03-28T10:00:00.000Z"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Payment status updated", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.any.keys("message", "success", "payment", "status");
      });
