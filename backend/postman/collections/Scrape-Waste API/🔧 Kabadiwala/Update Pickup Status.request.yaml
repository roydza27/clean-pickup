$kind: http-request
name: Update Pickup Status
method: PATCH
url: '{{baseUrl}}/api/kabadiwala/pickups/{{pickupId}}/status'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{kabadiwalaToken}}'
body:
  type: json
  content: |-
    {
      "status": "completed",
      "actualWeight": 6.5,
      "notes": "Collected all scrap items successfully"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Pickup status updated", function () {
          const json = pm.response.json();
          const status = json.status || (json.pickup && json.pickup.status);
          if (status) {
              pm.expect(status.toLowerCase()).to.equal("completed");
          }
      });
