$kind: http-request
name: Get Kabadiwala Earnings
method: GET
url: '{{baseUrl}}/api/kabadiwala/earnings'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{kabadiwalaToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Earnings data returned", function () {
          const json = pm.response.json();
          pm.expect(json).to.exist;
      });

      pm.test("Earnings has total field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.any.keys("total", "totalEarnings", "earnings", "amount");
      });
