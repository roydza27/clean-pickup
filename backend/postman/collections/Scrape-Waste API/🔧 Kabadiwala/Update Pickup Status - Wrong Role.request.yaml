$kind: http-request
name: Update Pickup Status - Wrong Role
method: PATCH
url: '{{baseUrl}}/api/kabadiwala/pickups/{{pickupId}}/status'
order: 5000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
body:
  type: json
  content: |-
    {
      "status": "completed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 401 or 403", function () {
          pm.expect(pm.response.code).to.be.oneOf([401, 403]);
      });

      pm.test("Error message present", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.any.keys("message", "error", "msg");
      });
