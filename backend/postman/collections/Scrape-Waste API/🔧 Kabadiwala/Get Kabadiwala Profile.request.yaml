$kind: http-request
name: Get Kabadiwala Profile
method: GET
url: '{{baseUrl}}/api/kabadiwala/profile'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{kabadiwalaToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Profile has required fields", function () {
          const json = pm.response.json();
          const profile = json.user || json.kabadiwala || json;
          pm.expect(profile).to.have.any.keys("name", "phone", "role", "_id", "id");
      });
