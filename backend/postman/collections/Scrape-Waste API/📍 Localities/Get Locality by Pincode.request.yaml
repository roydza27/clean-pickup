$kind: http-request
name: Get Locality by Pincode
method: GET
url: '{{baseUrl}}/api/localities/pincode/400001'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      if (pm.response.code === 200) {
          pm.test("Response has locality data", function () {
              const json = pm.response.json();
              pm.expect(json).to.be.an("object").and.not.empty;
          });
      }
