$kind: http-request
name: Create Locality (Admin)
method: POST
url: '{{baseUrl}}/api/admin/localities'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{adminToken}}'
body:
  type: json
  content: |-
    {
      "name": "Test Locality",
      "pincode": "400099",
      "city": "Mumbai",
      "state": "Maharashtra",
      "garbageSchedule": {
        "day": "Monday",
        "time": "08:00"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 or 200", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Locality created with ID", function () {
          const json = pm.response.json();
          const id = json._id || json.id || (json.locality && (json.locality._id || json.locality.id));
          pm.expect(id).to.exist;
          if (id) {
              pm.collectionVariables.set("localityId", id);
              console.log("Saved localityId:", id);
          }
      });
