$kind: http-request
name: 'Update Scrap Rate - Wrong Role (Citizen)'
method: POST
url: '{{baseUrl}}/api/scrap-rates/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
body:
  type: json
  content: |-
    {
      "localityId": "1",
      "material": "plastic",
      "ratePerKg": 15
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 403", function () {
          pm.response.to.have.status(403);
      });

      pm.test("Response has error: Forbidden", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.equal("Forbidden");
      });
