$kind: http-request
name: 'Update Scrap Rate (Admin)'
method: POST
url: '{{baseUrl}}/api/scrap-rates/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{adminToken}}'
body:
  type: json
  content: |-
    {
      "localityId": "{{localityId}}",
      "material": "plastic",
      "ratePerKg": 15
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Response has success indicator", function () {
          const json = pm.response.json();
          pm.expect(json).to.satisfy(function (val) {
              return val.success === true || val.message !== undefined || val.id !== undefined;
          });
      });
