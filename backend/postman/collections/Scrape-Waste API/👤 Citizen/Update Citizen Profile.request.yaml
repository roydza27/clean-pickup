$kind: http-request
name: Update Citizen Profile
method: PUT
url: '{{baseUrl}}/api/citizen/profile'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
body:
  type: json
  content: |-
    {
      "name": "Test Citizen",
      "address": "123 Test Street",
      "localityId": "{{localityId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Profile updated successfully", function () {
          const json = pm.response.json();
          pm.expect(json).to.satisfy(function (val) {
              return val.success === true || val.message !== undefined || val.name !== undefined;
          });
      });
