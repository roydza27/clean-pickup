$kind: http-request
name: Get Citizen Profile
method: GET
url: '{{baseUrl}}/api/citizen/profile'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has profile data", function () {
          const json = pm.response.json();
          pm.expect(json).to.be.an("object").and.not.empty;
      });
