$kind: http-request
name: Update Citizen Preferences
method: PUT
url: '{{baseUrl}}/api/citizen/preferences'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
body:
  type: json
  content: |-
    {
      "preferredPickupDay": "Monday",
      "preferredPickupTime": "morning",
      "notifications": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Preferences updated successfully", function () {
          const json = pm.response.json();
          pm.expect(json).to.satisfy(function (val) {
              return val.success === true || val.message !== undefined;
          });
      });
