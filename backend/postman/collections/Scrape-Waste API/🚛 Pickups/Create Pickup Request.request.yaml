$kind: http-request
name: Create Pickup Request
method: POST
url: '{{baseUrl}}/api/pickups'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
body:
  type: json
  content: |-
    {
      "localityId": "{{localityId}}",
      "address": "123 Test Street, Test Area",
      "scrapItems": [
        { "material": "newspaper", "estimatedWeight": 5 },
        { "material": "plastic", "estimatedWeight": 2 }
      ],
      "preferredDate": "2025-04-01",
      "preferredTime": "morning"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 or 200", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Pickup created with an ID", function () {
          const json = pm.response.json();
          const id = json._id || json.id || (json.pickup && (json.pickup._id || json.pickup.id));
          pm.expect(id).to.exist;
          if (id) {
              pm.collectionVariables.set("pickupId", id);
              console.log("Saved pickupId:", id);
          }
      });
