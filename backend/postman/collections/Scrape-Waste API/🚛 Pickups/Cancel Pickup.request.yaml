$kind: http-request
name: Cancel Pickup
method: PATCH
url: '{{baseUrl}}/api/pickups/{{pickupId}}/cancel'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{citizenToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Pickup status is cancelled", function () {
          const json = pm.response.json();
          const status = json.status || (json.pickup && json.pickup.status);
          if (status) {
              pm.expect(status.toLowerCase()).to.include("cancel");
          }
      });
